name: Validate

on:
  push:
  pull_request:

jobs:
  maids-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate maids.json
        run: npm run validate:maids
