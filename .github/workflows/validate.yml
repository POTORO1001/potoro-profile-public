name: Validate

on:
  push:
  pull_request:

jobs:
  maids-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate maids.json
        run: npm run validate:maids

      - name: Check operation script syntax
        run: node --check scripts/apply-maid-operation.js

      - name: Dry-run preparing join operation
        run: node scripts/apply-maid-operation.js operations/join-preparing.json --dry-run
